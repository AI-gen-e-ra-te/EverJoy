  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - digipeople-network

networks:
  digipeople-network:
    driver: bridge

volumes:
  # 如果需要持久化数据，可以取消注释以下行
