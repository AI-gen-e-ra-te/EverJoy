<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiPeople Core</title>
    <link rel="stylesheet" href="styles.css?v=20260419">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- ========== 左侧：素材区 ========== -->
        <aside class="panel panel-left">
            <div class="panel-header">
                <i class="fas fa-robot"></i>
                <span>DigiPeople</span>
            </div>

            <div class="panel-body">
                <!-- 上传 -->
                <section class="panel-section">
                    <h3 class="section-title">头像素材</h3>
                    <div class="upload-zone" id="upload-zone">
                        <input type="file" id="file-input" accept=".mp4" hidden>
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>拖放或点击上传 MP4</p>
                    </div>
                </section>

                <!-- Avatar 信息 -->
                <section class="panel-section" id="avatar-section" style="display:none;">
                    <h3 class="section-title">当前头像</h3>
                    <div class="avatar-card-mini">
                        <img id="avatar-thumb" src="" alt="">
                        <div class="avatar-meta">
                            <span class="avatar-name" id="avatar-name">--</span>
                            <span class="avatar-status" id="avatar-status">--</span>
                        </div>
                    </div>
                </section>

                <!-- 系统状态 -->
                <section class="panel-section">
                    <h3 class="section-title">系统状态</h3>
                    <ul class="status-list">
                        <li>
                            <span class="dot" id="dot-backend"></span>
                            <span>后端服务</span>
                            <span class="status-val" id="st-backend">--</span>
                        </li>
                        <li>
                            <span class="dot" id="dot-fay"></span>
                            <span>Fay</span>
                            <span class="status-val" id="st-fay">--</span>
                        </li>
                        <li>
                            <span class="dot" id="dot-fayws"></span>
                            <span>Fay WS</span>
                            <span class="status-val" id="st-fayws">--</span>
                        </li>
                        <li>
                            <span class="dot" id="dot-tts"></span>
                            <span>TTS</span>
                            <span class="status-val" id="st-tts">--</span>
                        </li>
                        <li>
                            <span class="dot" id="dot-musetalk"></span>
                            <span>MuseTalk</span>
                            <span class="status-val" id="st-musetalk">--</span>
                        </li>
                    </ul>
                    <button class="btn btn-sm btn-ghost" id="btn-health">
                        <i class="fas fa-sync-alt"></i> 刷新状态
                    </button>
                </section>
            </div>
        </aside>

        <!-- ========== 中间：聊天区 ========== -->
        <main class="panel panel-center">
            <div class="chat-header">
                <h2>对话</h2>
                <span class="chat-hint" id="chat-hint">上传头像后开始对话</span>
            </div>

            <div class="messages" id="messages">
                <div class="msg msg-system">
                    <div class="msg-bubble">
                        欢迎使用 DigiPeople Core。请先在左侧上传 MP4 头像视频，然后输入文字开始对话。
                    </div>
                </div>
            </div>

            <div class="input-bar">
                <button class="btn btn-icon" id="btn-mic" title="按住录音，松开发送">
                    <i class="fas fa-microphone"></i>
                </button>
                <textarea id="msg-input" placeholder="输入消息..." rows="1"></textarea>
                <button class="btn btn-send" id="btn-send" title="发送">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>

        <!-- ========== 右侧：视频区 ========== -->
        <aside class="panel panel-right">
            <div class="panel-header">
                <i class="fas fa-video"></i>
                <span>视频预览</span>
            </div>

            <div class="panel-body">
                <section class="video-box">
                    <div class="video-wrap" id="video-wrap">
                        <div class="video-placeholder" id="video-placeholder">
                            <i class="fas fa-film"></i>
                            <p>等待视频生成</p>
                        </div>
                        <video id="output-video" controls style="display:none;"></video>
                    </div>
                </section>

                <section class="panel-section">
                    <h3 class="section-title">渲染状态</h3>
                    <div class="render-info" id="render-info">
                        <p class="muted">暂无渲染记录</p>
                    </div>
                </section>
            </div>
        </aside>
    </div>

    <!-- 通知 -->
    <div id="toasts"></div>

    <script src="app.js?v=20260419"></script>
</body>
</html>
